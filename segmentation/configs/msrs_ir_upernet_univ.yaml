# MSRS infrared semantic segmentation entry config for UPerNet + UNIV.
# This records the original UNIV downstream-task setting. It is intentionally
# framework-neutral until the MMSegmentation adapter is implemented.

dataset:
  name: MSRS-IR
  modality: infrared
  task: semantic_segmentation
  counts:
    training_images: 1083
    testing_images: 361
  paths:
    root: null
    images: images
    masks: masks
    train_split: splits/train.txt
    test_split: splits/test.txt

model:
  backbone: UNIV
  head: UperNet
  input_resolution: [512, 512]

training:
  optimizer: AdamW
  weight_decay: 0.05
  lr_schedule: Poly
  ignore_index: 255

integration:
  target_framework: MMSegmentation
  status: entrypoint_only
  todo:
    - Convert this metadata into an MMSegmentation config.
    - Register the MSRS-IR dataset adapter.
    - Wire UNIV checkpoint loading into the UPerNet backbone.
