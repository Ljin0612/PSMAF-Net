# MFNet infrared semantic segmentation entry config for UPerNet + UNIV.
# The public UNIV repository does not define a verified MFNet directory layout
# in this scaffold. Keep paths as TODO metadata until the real local dataset
# schema is confirmed.

dataset:
  name: MFNet-IR
  modality: infrared
  task: semantic_segmentation
  counts:
    training_images: 1569
    validation_images: 392
    testing_images: 393
  data_root: null
  train:
    img_dir: TODO_CONFIRM_MFNET_TRAIN_IMAGES
    ann_dir: TODO_CONFIRM_MFNET_TRAIN_ANNOTATIONS
  val:
    img_dir: TODO_CONFIRM_MFNET_VAL_IMAGES
    ann_dir: TODO_CONFIRM_MFNET_VAL_ANNOTATIONS
  test:
    img_dir: TODO_CONFIRM_MFNET_TEST_IMAGES
    ann_dir: TODO_CONFIRM_MFNET_TEST_ANNOTATIONS

model:
  backbone: UNIV
  head: UperNet
  input_resolution: [512, 512]

training:
  optimizer: AdamW
  weight_decay: 0.05
  lr_schedule: Poly
  ignore_index: 255

integration:
  target_framework: MMSegmentation
  status: entrypoint_only
  todo:
    - Confirm the real MFNet-IR local directory layout before wiring paths.
    - Convert this metadata into an MMSegmentation config.
    - Register the MFNet-IR dataset adapter.
    - Wire UNIV checkpoint loading into the UPerNet backbone.
